<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <title>Piggy Can Fly!</title>
  <meta name="description" content="A gentle musical flying game for little ones." />

  <link rel="stylesheet" href="style.css" />


  <!-- PWA / Add-to-Home-Screen -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#ff8fc7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Piggy Fly" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" type="image/png" href="icons/icon-192.png" />
</head>
<body>
  <div id="game">
    <canvas id="c"></canvas>

    <!-- Little counter of collected treasures (top-left) -->
    <div id="hud" aria-hidden="true"></div>

    <!-- Start screen / settings -->
    <div id="start" class="overlay">
      <div class="panel settings-panel">
        <h1>Piggy Can Fly!</h1>
        <div class="settings">
          <div class="setting">
            <p class="pick-label">Flyer</p>
            <div class="chip-group" data-setting="animal">
              <button class="chip emoji" data-value="pig" aria-label="Pig">🐷</button>
              <button class="chip emoji" data-value="cow" aria-label="Cow">🐮</button>
              <button class="chip emoji" data-value="dog" aria-label="Dog">🐶</button>
              <button class="chip emoji" data-value="cat" aria-label="Cat">🐱</button>
              <button class="chip emoji" data-value="horse" aria-label="Horse">🐴</button>
            </div>
          </div>
          <div class="setting">
            <p class="pick-label">Song</p>
            <div class="chip-group" data-setting="song">
              <button class="chip" data-value="random">🎲 Surprise</button>
              <button class="chip" data-value="0">Twinkle</button>
              <button class="chip" data-value="1">Mary</button>
              <button class="chip" data-value="2">Row Row</button>
              <button class="chip" data-value="3">Birthday</button>
              <button class="chip" data-value="4">Old MacDonald</button>
              <button class="chip" data-value="5">Baa Baa</button>
            </div>
          </div>
          <div class="setting">
            <p class="pick-label">Sky</p>
            <div class="chip-group" data-setting="sky">
              <button class="chip" data-value="random">🎲 Surprise</button>
              <button class="chip" data-value="day">Day</button>
              <button class="chip" data-value="dawn">Dawn</button>
              <button class="chip" data-value="sunset">Sunset</button>
              <button class="chip" data-value="dusk">Dusk</button>
              <button class="chip" data-value="morning">Morning</button>
            </div>
          </div>
          <div class="setting">
            <p class="pick-label">Adventure length</p>
            <div class="chip-group" data-setting="length">
              <button class="chip" data-value="short">Short</button>
              <button class="chip" data-value="medium">Medium</button>
              <button class="chip" data-value="long">Long</button>
            </div>
          </div>
          <div class="setting">
            <p class="pick-label">Flying</p>
            <div class="chip-group" data-setting="flying">
              <button class="chip" data-value="easy">Easy float</button>
              <button class="chip" data-value="normal">Normal</button>
            </div>
          </div>
          <div class="setting">
            <p class="pick-label">Sound</p>
            <div class="chip-group" data-setting="sound">
              <button class="chip" data-value="on">🔊 On</button>
              <button class="chip" data-value="off">🔇 Off</button>
            </div>
          </div>
        </div>
        <button id="startBtn" class="bigbtn">TAP TO PLAY</button>
      </div>
    </div>

    <!-- Win screen -->
    <div id="win" class="overlay hidden">
      <div class="panel">
        <div class="big-emoji">🎉🐷🌈</div>
        <h1>You did it!</h1>
        <p class="sub">Piggy touched the clouds! ☁️✨</p>
        <button id="againBtn" class="bigbtn">PLAY AGAIN</button>
        <button id="settingsBtn" class="minibtn">⚙︎ Settings</button>
      </div>
    </div>
  </div>

  <script src="audio.js"></script>
  <script src="game.js"></script>
</body>
</html>
